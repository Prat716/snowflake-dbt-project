version: 2

models:
  - name: my_first_dbt_model
    description: >
      Base model — a simple table with a single 'id' column.
      Includes a null row to demonstrate downstream filtering.
    columns:
      - name: id
        description: Primary key. One row is intentionally null.
        tests:
          - unique
          - not_null:
              config:
                severity: warn   # null row is intentional; warn rather than error

  - name: my_second_dbt_model
    description: >
      SQL view that filters nulls from my_first_dbt_model.
    columns:
      - name: id
        description: Primary key — guaranteed non-null in this view.
        tests:
          - unique
          - not_null

  - name: my_first_python_model
    description: >
      First Snowpark Python model. Reads my_first_dbt_model as a DataFrame
      and returns it unchanged — demonstrating the minimal Python model pattern.

  - name: my_second_python_model
    description: >
      Second Snowpark Python model. Demonstrates using a Python UDF (add_one)
      to add a derived column (id_plus_one) to the base dataset.
